<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Dynamic Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEFA6" />
      <stop offset="40%" stop-color="#D4940A" />
      <stop offset="100%" stop-color="#7B5600" />
    </linearGradient>
    
    <!-- Dark Metallic Gradient -->
    <radialGradient id="dark-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E1E24" />
      <stop offset="100%" stop-color="#0B0B0D" />
    </radialGradient>
  </defs>

  <!-- Squircle Base -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#dark-grad)" stroke="url(#gold-grad)" stroke-width="12" />
  
  <!-- Outer Aperture Ring -->
  <circle cx="256" cy="256" r="150" stroke="url(#gold-grad)" stroke-width="8" stroke-dasharray="12 12" opacity="0.6" />
  <circle cx="256" cy="256" r="130" stroke="url(#gold-grad)" stroke-width="3" />

  <!-- Geometric Shutter / Aperture Blades -->
  <g transform="translate(256, 256)">
    <!-- Blade 1 -->
    <path d="M 0,-110 L 80,-40 L 40,80 Z" fill="url(#gold-grad)" opacity="0.85" transform="rotate(0)" />
    <!-- Blade 2 -->
    <path d="M 0,-110 L 80,-40 L 40,80 Z" fill="url(#gold-grad)" opacity="0.85" transform="rotate(60)" />
    <!-- Blade 3 -->
    <path d="M 0,-110 L 80,-40 L 40,80 Z" fill="url(#gold-grad)" opacity="0.85" transform="rotate(120)" />
    <!-- Blade 4 -->
    <path d="M 0,-110 L 80,-40 L 40,80 Z" fill="url(#gold-grad)" opacity="0.85" transform="rotate(180)" />
    <!-- Blade 5 -->
    <path d="M 0,-110 L 80,-40 L 40,80 Z" fill="url(#gold-grad)" opacity="0.85" transform="rotate(240)" />
    <!-- Blade 6 -->
    <path d="M 0,-110 L 80,-40 L 40,80 Z" fill="url(#gold-grad)" opacity="0.85" transform="rotate(300)" />

    <!-- Center Play Glass Core -->
    <circle cx="0" cy="0" r="50" fill="#0B0B0D" stroke="url(#gold-grad)" stroke-width="6" />
    <polygon points="-12,-18 -12,18 20,0" fill="url(#gold-grad)" />
  </g>
</svg>
